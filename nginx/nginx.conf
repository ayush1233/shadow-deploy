worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─────────────────────────────────────────
    # Docker DNS resolver (critical for runtime resolution)
    # ─────────────────────────────────────────
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ─────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"request_id":"$request_id",'
            '"x_tenant_id":"$http_x_tenant_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ─────────────────────────────────────────
    # Performance
    # ─────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    server_tokens off;

    # ─────────────────────────────────────────
    # Gzip
    # ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ─────────────────────────────────────────
    # Rate Limiting
    # ─────────────────────────────────────────
    limit_req_zone $http_x_tenant_id zone=tenant_limit:10m rate=1000r/s;
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=100r/s;

    # ─────────────────────────────────────────
    # Upstreams (host.docker.internal resolves always)
    # ─────────────────────────────────────────
    upstream production-backend {
        server ${PROD_BACKEND_HOST}:${PROD_BACKEND_PORT};
        keepalive 32;
    }

    upstream shadow-backend {
        server ${SHADOW_BACKEND_HOST}:${SHADOW_BACKEND_PORT};
        keepalive 32;
    }

    # ─────────────────────────────────────────
    # Shadow Mirror Server (internal)
    # ─────────────────────────────────────────
    server {
        listen 8888;
        server_name _;

        location / {
            proxy_pass http://shadow-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Shadow-Request "true";

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;

            # Forward shadow response to ingestion service
            mirror /mirror_to_ingestion;
            mirror_request_body on;
        }

        location = /mirror_to_ingestion {
            internal;
            set $ingestion_backend "ingestion-service:8081";
            proxy_pass http://$ingestion_backend/api/v1/ingest/shadow;
            proxy_set_header Content-Type "application/json";
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header X-Traffic-Type "shadow";
            proxy_set_header X-Tenant-ID $http_x_tenant_id;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Response-Status $upstream_status;
            proxy_set_header X-Response-Time $upstream_response_time;
        }
    }

    # ─────────────────────────────────────────
    # Main API Gateway
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Assign request ID to variable so it stays consistent across mirror subrequests
        set $trace_id $request_id;

        # Request ID injection
        add_header X-Request-ID $trace_id always;

        # Rate limiting
        limit_req zone=tenant_limit burst=200 nodelay;
        limit_req zone=ip_limit burst=50 nodelay;

        # Health check
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"shadow-proxy"}';
            add_header Content-Type application/json;
        }

        # Proxy metrics
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 172.16.0.0/12;
            deny all;
        }

        # ─────────────────────────────────────
        # Production API Proxy
        # ─────────────────────────────────────
        location / {
            proxy_pass http://production-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $trace_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            # Mirror traffic to shadow backend
            mirror /shadow_mirror;
            mirror_request_body on;

            # Forward to production
            proxy_pass http://production-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $trace_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # Send production response metadata to ingestion
            post_action @ingest_prod;
        }

        # Shadow mirror target
        location = /shadow_mirror {
            internal;
            proxy_pass http://127.0.0.1:8888$request_uri;
            proxy_set_header X-Request-ID $trace_id;
            proxy_set_header X-Tenant-ID $http_x_tenant_id;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
        }

        # Post-action: send prod metadata to ingestion
        location @ingest_prod {
            set $ingestion_backend "ingestion-service:8081";
            rewrite ^ /api/v1/ingest/production break;
            proxy_pass http://$ingestion_backend;
            proxy_set_header Content-Type "application/json";
            proxy_set_header X-Request-ID $trace_id;
            proxy_set_header X-Traffic-Type "production";
            proxy_set_header X-Tenant-ID $http_x_tenant_id;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Response-Status $upstream_status;
            proxy_set_header X-Response-Time $upstream_response_time;
            proxy_method POST;
        }

        # ─────────────────────────────────────
        # Ingestion API (SDK / Gateway Plugin)
        # ─────────────────────────────────────
        location /ingest/ {
            set $ingestion_backend "ingestion-service:8081";
            proxy_pass http://$ingestion_backend/api/v1/ingest/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─────────────────────────────────────
        # Dashboard API (uses variable for runtime DNS)
        # ─────────────────────────────────────
        location /dashboard-api/ {
            set $api_backend "api-service:8083";
            proxy_pass http://$api_backend/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
