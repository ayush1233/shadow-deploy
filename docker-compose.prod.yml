# Shadow Deploy — Production Deployment
# Override file: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This removes sample-api containers and sets production-appropriate settings.

services:
  # ─── Override infrastructure for production ───────────────
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 768M

  kafka:
    environment:
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_RETENTION_BYTES: 5368709120
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Application services ─────────────────────────────────
  nginx-proxy:
    environment:
      - PROD_BACKEND_HOST=${PROD_BACKEND_HOST}
      - PROD_BACKEND_PORT=${PROD_BACKEND_PORT}
      - SHADOW_BACKEND_HOST=${SHADOW_BACKEND_HOST}
      - SHADOW_BACKEND_PORT=${SHADOW_BACKEND_PORT}
      - MIRROR_PERCENTAGE=${MIRROR_PERCENTAGE:-100}
      - INTERNAL_SHARED_SECRET=${INTERNAL_SHARED_SECRET}
    deploy:
      resources:
        limits:
          memory: 256M

  ingestion-service:
    environment:
      - SPRING_PROFILES_ACTIVE=docker,prod
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - INTERNAL_SHARED_SECRET=${INTERNAL_SHARED_SECRET}
    deploy:
      resources:
        limits:
          memory: 512M

  comparison-engine:
    environment:
      - SPRING_PROFILES_ACTIVE=docker,prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shadow_deploy
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-shadow}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PROD_BACKEND_HOST=${PROD_BACKEND_HOST}
      - PROD_BACKEND_PORT=${PROD_BACKEND_PORT}
      - SHADOW_BACKEND_HOST=${SHADOW_BACKEND_HOST}
      - SHADOW_BACKEND_PORT=${SHADOW_BACKEND_PORT}
    deploy:
      resources:
        limits:
          memory: 768M

  api-service:
    environment:
      - SPRING_PROFILES_ACTIVE=docker,prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shadow_deploy
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-shadow}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    deploy:
      resources:
        limits:
          memory: 512M

  ai-service:
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    deploy:
      resources:
        limits:
          memory: 512M

  dashboard:
    build:
      args:
        VITE_API_URL: ${VITE_API_URL}
    deploy:
      resources:
        limits:
          memory: 128M

  # ─── Disable sample APIs in production ────────────────────
  sample-api-v1:
    deploy:
      replicas: 0

  sample-api-v2:
    deploy:
      replicas: 0
