server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: comparison-engine
  lifecycle:
    timeout-per-shutdown-phase: 30s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: comparison-engine-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.HashMap
        max.poll.records: 100
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000

  datasource:
    url: jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.likjiuylgndoedpkzxhb
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 30000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000
      data-source-properties:
        socketTimeout: 30
        connectTimeout: 10
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true

shadow:
  kafka:
    topics:
      prod-traffic: prod-traffic
      shadow-traffic: shadow-traffic
      comparison-results: comparison-results
      alerts: alerts
  correlation:
    ttl-seconds: 120
    window-ms: 60000
  ai:
    service-url: ${AI_SERVICE_URL:http://localhost:8000}
    timeout-ms: 30000
    enabled: true
  comparison:
    ignore-fields:
      - timestamp
      - created_at
      - updated_at
      - request_id
      - trace_id
    ignore-header-keys:
      - date
      - x-request-id
      - x-trace-id
      - server
  noise:
    min-samples: 10
    threshold-percent: 80
    ttl-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.shadow.platform: DEBUG
    org.springframework.kafka: WARN
