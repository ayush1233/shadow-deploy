apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shadow-proxy
  template:
    metadata:
      labels:
        app: shadow-proxy
    spec:
      containers:
      - name: proxy
        image: {{ .Values.proxy.image }}
        ports:
        - containerPort: 80
        - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: shadow-proxy
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: shadow-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shadow-ingestion
  template:
    metadata:
      labels:
        app: shadow-ingestion
    spec:
      containers:
      - name: ingestion
        image: {{ .Values.ingestionService.image }}
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "{{ .Release.Name }}-kafka:9092"
        - name: REDIS_HOST
          value: "{{ .Release.Name }}-redis-master"
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
spec:
  ports:
  - port: 8081
    targetPort: 8081
  selector:
    app: shadow-ingestion
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-comparison
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shadow-comparison
  template:
    metadata:
      labels:
        app: shadow-comparison
    spec:
      containers:
      - name: comparison
        image: {{ .Values.comparisonEngine.image }}
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "{{ .Release.Name }}-kafka:9092"
        - name: REDIS_HOST
          value: "{{ .Release.Name }}-redis-master"
        - name: SUPABASE_DB_PASSWORD
          value: {{ .Values.global.supabasePassword | quote }}
        - name: GEMINI_API_KEY
          value: {{ .Values.global.geminiApiKey | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shadow-api
  template:
    metadata:
      labels:
        app: shadow-api
    spec:
      containers:
      - name: api
        image: {{ .Values.apiService.image }}
        env:
        - name: REDIS_HOST
          value: "{{ .Release.Name }}-redis-master"
        - name: SUPABASE_DB_PASSWORD
          value: {{ .Values.global.supabasePassword | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  ports:
  - port: 8083
    targetPort: 8083
  selector:
    app: shadow-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shadow-ai
  template:
    metadata:
      labels:
        app: shadow-ai
    spec:
      containers:
      - name: ai
        image: {{ .Values.aiService.image }}
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "{{ .Release.Name }}-kafka:9092"
        - name: REDIS_HOST
          value: "{{ .Release.Name }}-redis-master"
        - name: GEMINI_API_KEY
          value: {{ .Values.global.geminiApiKey | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: shadow-ai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shadow-dashboard
  template:
    metadata:
      labels:
        app: shadow-dashboard
    spec:
      containers:
      - name: dashboard
        image: {{ .Values.dashboard.image }}
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: shadow-dashboard
