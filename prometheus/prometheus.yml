global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ingestion-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['ingestion-service:8081']

  - job_name: 'comparison-engine'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['comparison-engine:8082']

  - job_name: 'api-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['api-service:8083']

  - job_name: 'ai-service'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['ai-service:8000']

  - job_name: 'nginx'
    metrics_path: '/nginx-status'
    scrape_interval: 10s
    static_configs:
      - targets: ['nginx-proxy:80']


  - job_name: 'elasticsearch'
    metrics_path: '/_prometheus/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['elasticsearch:9200']
